      Uppsala University has no central developer portal; its public API
      footprint is research-infrastructure driven and decentralized. Three
      public interfaces were verified live: the UCDP RESTful API (returns 401
      without a token, exactly as documented — token is free on request), the
      Norse World REST-API (200, returns JSON/GeoJSON/JSON-LD), and the DiVA
      institutional repository OAI-PMH 2.0 endpoint (200, Identify verb
      confirmed). The official GitHub org and website resolve. No endpoints or
      properties were fabricated; only confirmed resources are cataloged.
